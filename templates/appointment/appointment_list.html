<!DOCTYPE html>
<html>
<body>

<h2>Appointments</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Patient ID</th>
<th>Doctor ID</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

{% for appointment in appointments %}

<tr>
<td>{{ appointment.id }}</td>
<td>{{ appointment.patient_id }}</td>
<td>{{ appointment.doctor_id }}</td>
<td>{{ appointment.appointment_date }}</td>
<td>{{ appointment.appointment_time }}</td>
<td>{{ appointment.status }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
