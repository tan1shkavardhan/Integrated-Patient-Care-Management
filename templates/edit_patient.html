<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
</head>
<body>

<h2>Edit Patient</h2>

<form method="POST">

<label>Full Name</label><br>
<input type="text" name="fullname" value="{{ patient.fullname }}" required><br><br>

<label>Age</label><br>
<input type="number" name="age" value="{{ patient.age }}" required><br><br>

<label>Gender</label><br>
<select name="gender">
    <option value="Male" {% if patient.gender=="Male" %}selected{% endif %}>Male</option>
    <option value="Female" {% if patient.gender=="Female" %}selected{% endif %}>Female</option>
    <option value="Other" {% if patient.gender=="Other" %}selected{% endif %}>Other</option>
</select><br><br>

<label>Contact Number</label><br>
<input type="text" name="contact" value="{{ patient.contact }}" required><br><br>

<label>Address</label><br>
<textarea name="address" required>{{ patient.address }}</textarea><br><br>

<label>Blood Group</label><br>
<select name="blood_group">
    <option value="A+" {% if patient.blood_group=="A+" %}selected{% endif %}>A+</option>
    <option value="A-" {% if patient.blood_group=="A-" %}selected{% endif %}>A-</option>
    <option value="B+" {% if patient.blood_group=="B+" %}selected{% endif %}>B+</option>
    <option value="B-" {% if patient.blood_group=="B-" %}selected{% endif %}>B-</option>
    <option value="AB+" {% if patient.blood_group=="AB+" %}selected{% endif %}>AB+</option>
    <option value="AB-" {% if patient.blood_group=="AB-" %}selected{% endif %}>AB-</option>
    <option value="O+" {% if patient.blood_group=="O+" %}selected{% endif %}>O+</option>
    <option value="O-" {% if patient.blood_group=="O-" %}selected{% endif %}>O-</option>
</select><br><br>

<input type="submit" value="Update Patient">

</form>

<br>
<a href="/patients">Back to Patient List</a>

</body>
</html>
