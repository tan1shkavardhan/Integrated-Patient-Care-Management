{% extends "layouts/auth_base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="card auth-card p-4">

    <div class="text-center mb-4">

        <i class="bi bi-hospital logo"></i>

        <h2 class="fw-bold">
            Patient Care Management
        </h2>

        <p class="text-muted">
            Create your account to continue
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Register As</label>

            <select
                id="role"
                name="role"
                class="form-select"
                onchange="changeRole()"
                required>

                <option value="">Select Role</option>
                <option value="Patient">Patient</option>
                <option value="Doctor">Doctor</option>
                <option value="Nurse">Nurse</option>
                <option value="Admin">Admin</option>

            </select>
        </div>

        <input
            class="form-control mb-3"
            name="fullname"
            placeholder="Full Name"
            required>

        <input
            class="form-control mb-3"
            type="email"
            name="email"
            placeholder="Email"
            required>

        <input
            class="form-control mb-3"
            name="phone"
            placeholder="Phone Number"
            required>

        <input
            class="form-control mb-3"
            type="password"
            name="password"
            placeholder="Password"
            required>


        <!-- ================= PATIENT ================= -->

        <div id="patientFields" style="display:none;">

            <hr>

            <h5 class="mb-3">Patient Details</h5>

            <input
                class="form-control mb-3"
                name="age"
                placeholder="Age">

            <select class="form-select mb-3" name="gender">

                <option value="">Gender</option>
                <option>Male</option>
                <option>Female</option>

            </select>

            <input
                class="form-control mb-3"
                name="blood_group"
                placeholder="Blood Group">

            <textarea
                class="form-control mb-3"
                name="address"
                rows="3"
                placeholder="Address"></textarea>

        </div>


        <!-- ================= DOCTOR ================= -->

        <div id="doctorFields" style="display:none;">

            <hr>

            <h5 class="mb-3">Doctor Details</h5>

            <input
                class="form-control mb-3"
                name="specialization"
                placeholder="Specialization">

            <input
                class="form-control mb-3"
                name="qualification"
                placeholder="Qualification">

            <input
                class="form-control mb-3"
                name="doctor_department"
                placeholder="Department">

            <input
                class="form-control mb-3"
                name="available_time"
                placeholder="Available Time">

        </div>


        <!-- ================= NURSE ================= -->

        <div id="nurseFields" style="display:none;">

            <hr>

            <h5 class="mb-3">Nurse Details</h5>

            <input
                class="form-control mb-3"
                name="nurse_department"
                placeholder="Department">

            <select
                class="form-select mb-3"
                name="shift">

                <option value="">Shift</option>
                <option>Morning</option>
                <option>Evening</option>
                <option>Night</option>

            </select>

        </div>


        <button class="btn btn-primary w-100 mt-3">
            Register
        </button>

        <div class="text-center mt-3">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </div>

    </form>

</div>

<script>

function changeRole(){

    document.getElementById("patientFields").style.display="none";
    document.getElementById("doctorFields").style.display="none";
    document.getElementById("nurseFields").style.display="none";

    const role=document.getElementById("role").value;

    if(role==="Patient"){
        document.getElementById("patientFields").style.display="block";
    }

    else if(role==="Doctor"){
        document.getElementById("doctorFields").style.display="block";
    }

    else if(role==="Nurse"){
        document.getElementById("nurseFields").style.display="block";
    }

}

</script>

{% endblock %}
